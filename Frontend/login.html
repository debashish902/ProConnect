<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - ProConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css"/>
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0A1628;
      --accent: #2563EB;
      --surface: #FFFFFF;
      --bg: #F1F4F9;
      --text: #0F172A;
      --muted: #64748B;
      --border: #E2E8F0;
      --red: #DC2626;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(10,22,40,0.12);
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: all 0.2s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 44px;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--accent);
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .toggle-password .eye-off {
      display: none;
    }

    .toggle-password.visible .eye-on {
      display: none;
    }

    .toggle-password.visible .eye-off {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .submit-btn:hover {
      background: #1D4ED8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .error-msg {
      text-align: center;
      color: var(--red);
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .back-link {
      position: fixed;
      top: 24px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 24px;
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
      transition: all 0.2s;
      z-index: 10;
    }

    .back-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: translateX(-2px);
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      transition: transform 0.2s;
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      font-family: inherit;
    }

    .toast.show { opacity: 1; }
    .toast.success { background: #065F46; color: #fff; }
    .toast.error { background: #991B1B; color: #fff; }

    
    .forgot-link {
      text-align: right;
      margin-top: 10px;
      margin-bottom: 14px;
    }

    .forgot-link a {
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .forgot-link a:hover {
      color: #1D4ED8;
      text-decoration: underline;
    }

    
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.5);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(10,22,40,0.2);
      padding: 36px 32px;
      max-width: 400px;
      width: 90%;
      transform: translateY(30px) scale(0.95);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--muted);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--bg);
      color: var(--text);
    }

    .modal-close svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .modal-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 22px;
      line-height: 1.4;
    }

    .modal-error {
      text-align: center;
      color: var(--red);
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .modal-success {
      text-align: center;
      color: #065F46;
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    
    .step-indicator {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }

    .step-dot {
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      transition: background 0.3s;
    }

    .step-dot.active {
      background: var(--accent);
    }
    
  </style>
</head>
<body>

  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back
  </a>
  <button class="theme-toggle-btn light-nav" onclick="ProConnectTheme.toggle()" title="Toggle theme" style="position:fixed;top:24px;right:24px;z-index:10;">
    <svg class="theme-icon-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
    <svg class="theme-icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
  </button>
<div class="login-card">
  <a href="index.html"><h1 class="logo">ProConnect</h1></a>
  <p class="subtitle">Welcome back</p>

  <div class="error-msg" id="login-error"></div>

  <form onsubmit="event.preventDefault(); handleLogin();">
    <div class="field">
      <label for="email">Email Address</label>
      <input id="email" type="text" placeholder="john@example.com">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input id="password" type="password" placeholder="Enter your password">
        <button type="button" class="toggle-password" id="toggle-password-btn" onclick="togglePasswordVisibility()" title="Show password">
          <svg class="eye-on" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          <svg class="eye-off" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
  </form>

  <div class="forgot-link">
    <a onclick="openForgotModal()">Forgot Password?</a>
  </div>

  <p class="register-link">
    Don't have an account? <a href="register.html">Register</a>
  </p>
</div>


<div class="modal-overlay" id="forgot-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>Reset Password</h2>
      <button class="modal-close" onclick="closeForgotModal()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <p class="modal-subtitle">Enter your registered email and set a new password.</p>

    <div class="step-indicator">
      <div class="step-dot active" id="step-dot-1"></div>
      <div class="step-dot" id="step-dot-2"></div>
    </div>

    <div class="modal-error" id="forgot-error"></div>
    <div class="modal-success" id="forgot-success"></div>

    
    <div id="forgot-step-1">
      <div class="field">
        <label for="forgot-email">Email Address</label>
        <input id="forgot-email" type="email" placeholder="Enter your registered email">
      </div>
      <button type="button" class="submit-btn" onclick="goToStep2()">Continue</button>
    </div>

    
    <div id="forgot-step-2" style="display:none;">
      <div class="field">
        <label for="forgot-new-password">New Password</label>
        <div class="password-wrapper">
          <input id="forgot-new-password" type="password" placeholder="At least 6 characters">
          <button type="button" class="toggle-password" onclick="toggleForgotPassword('forgot-new-password', this)" title="Show password">
            <svg class="eye-on" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="forgot-confirm-password">Confirm Password</label>
        <div class="password-wrapper">
          <input id="forgot-confirm-password" type="password" placeholder="Re-enter new password">
          <button type="button" class="toggle-password" onclick="toggleForgotPassword('forgot-confirm-password', this)" title="Show password">
            <svg class="eye-on" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <svg class="eye-off" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
          </button>
        </div>
      </div>
      <button type="button" class="submit-btn" id="reset-btn" onclick="handleResetPassword()">Reset Password</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorEl.textContent = '';

    if (!email || !password) {
      errorEl.textContent = 'Please enter both email and password';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing In...';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem('token', data.token);
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 1000);
      } else {
        errorEl.textContent = data.message || 'Login failed';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (err) {
      errorEl.textContent = 'Server error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-password-btn');
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleBtn.classList.toggle('visible', isPassword);
    toggleBtn.title = isPassword ? 'Hide password' : 'Show password';
  }

 
  function openForgotModal() {
    document.getElementById('forgot-modal').classList.add('active');
    document.getElementById('forgot-error').textContent = '';
    document.getElementById('forgot-success').textContent = '';
    document.getElementById('forgot-step-1').style.display = 'block';
    document.getElementById('forgot-step-2').style.display = 'none';
    document.getElementById('step-dot-1').classList.add('active');
    document.getElementById('step-dot-2').classList.remove('active');
    document.getElementById('forgot-email').value = '';
    document.getElementById('forgot-email').focus();
  }

  function closeForgotModal() {
    document.getElementById('forgot-modal').classList.remove('active');
  }

  
  document.getElementById('forgot-modal').addEventListener('click', function(e) {
    if (e.target === this) closeForgotModal();
  });

  function goToStep2() {
    const email = document.getElementById('forgot-email').value.trim();
    const errorEl = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');
    errorEl.textContent = '';
    successEl.textContent = '';

    if (!email) {
      errorEl.textContent = 'Please enter your email address';
      return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      errorEl.textContent = 'Please enter a valid email address';
      return;
    }

    document.getElementById('forgot-step-1').style.display = 'none';
    document.getElementById('forgot-step-2').style.display = 'block';
    document.getElementById('step-dot-2').classList.add('active');
    document.getElementById('forgot-new-password').focus();
  }

  function toggleForgotPassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.classList.toggle('visible', isPassword);
    btn.title = isPassword ? 'Hide password' : 'Show password';
  }

  async function handleResetPassword() {
    const email = document.getElementById('forgot-email').value.trim();
    const newPassword = document.getElementById('forgot-new-password').value;
    const confirmPassword = document.getElementById('forgot-confirm-password').value;
    const errorEl = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');
    const btn = document.getElementById('reset-btn');

    errorEl.textContent = '';
    successEl.textContent = '';

    if (!newPassword || !confirmPassword) {
      errorEl.textContent = 'Please fill in both password fields';
      return;
    }

    if (newPassword.length < 6) {
      errorEl.textContent = 'Password must be at least 6 characters';
      return;
    }

    if (newPassword !== confirmPassword) {
      errorEl.textContent = 'Passwords do not match';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Resetting...';

    try {
      const res = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, newPassword })
      });

      const data = await res.json();

      if (res.ok) {
        successEl.textContent = data.message || 'Password reset successfully!';
        errorEl.textContent = '';
        btn.textContent = 'Done ✓';
        setTimeout(() => {
          closeForgotModal();
          showToast('Password updated! You can now sign in.', 'success');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }, 1500);
      } else {
        errorEl.textContent = data.message || 'Reset failed';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    } catch (err) {
      errorEl.textContent = 'Server error. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }
</script>

</body>
</html>
